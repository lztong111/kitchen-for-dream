version: '3.8'

services:
  kitchen:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kitchen-for-dream
    ports:
      - "8888:8888"
    volumes:
      - kitchen-uploads:/app/server/uploads
      - kitchen-db:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8888
      - JWT_SECRET=${JWT_SECRET:-kitchen-change-this-to-random-string}
      - DB_PATH=/app/data/kitchen.db
    restart: unless-stopped

volumes:
  kitchen-uploads:
  kitchen-db:
